name: Checkstyle
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  checkstyle_job:
    runs-on: ubuntu-latest
    name: Checkstyle job

    # GitHub token permissions
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v7.0.1
    - name: Run check style
      uses: dbelyaev/action-checkstyle@v3.12.1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
